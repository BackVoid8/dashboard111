<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar">
    <h1>Obsidian Dashboard</h1>
    <button id="fullscreenBtn" class="icon-btn">⛶ Fullscreen</button>
  </header>

  <main class="dashboard" id="dashboard">
    <section class="widget date-widget" data-widget="date">
      <h2 class="widget-title">Today</h2>
      <p id="dayName" class="day-name"></p>
      <p id="fullDate" class="full-date"></p>
    </section>

    <section class="widget clock-widget" data-widget="clock">
      <div class="widget-header">
        <h2 class="widget-title">Digital Clock</h2>
        <button class="icon-btn" data-action="toggle-settings" data-target="clock-settings">⚙</button>
      </div>
      <p id="clockTime" class="clock-time"></p>
      <div id="clock-settings" class="settings-panel hidden">
        <label><input type="checkbox" id="toggleSeconds" /> Show seconds</label>
        <label><input type="checkbox" id="toggle24Hour" /> 24-hour format</label>
      </div>
    </section>

    <section class="widget calendar-widget" data-widget="calendar">
      <div class="widget-header">
        <h2 class="widget-title">Calendar</h2>
        <div class="calendar-nav">
          <button class="icon-btn" id="prevMonth">‹</button>
          <button class="icon-btn" id="nextMonth">›</button>
        </div>
      </div>
      <p id="calendarMonth" class="calendar-month"></p>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="events-row">
        <h3>Upcoming</h3>
        <ul id="upcomingEvents"></ul>
      </div>
    </section>

    <section class="widget weather-widget" data-widget="weather">
      <h2 class="widget-title">Weather (Live API)</h2>
      <div class="weather-main">
        <span id="weatherIcon" class="weather-icon">☁</span>
        <div>
          <p id="weatherTemp" class="weather-temp">--°F</p>
          <p id="weatherCond" class="weather-cond">Loading...</p>
        </div>
      </div>
      <p id="weatherRange" class="weather-range">H: -- • L: --</p>
      <small id="weatherMeta" class="subtle"></small>
    </section>

    <section class="widget sun-widget" data-widget="sun">
      <h2 class="widget-title">Solar Position</h2>
      <p id="sunAngle" class="big-metric"></p>
      <p id="sunriseSunset" class="subtle"></p>
      <p id="goldenHour" class="subtle"></p>
      <p id="midnightCountdown" class="subtle"></p>
    </section>

    <section class="widget countdown-widget" data-widget="countdown">
      <div class="widget-header">
        <h2 class="widget-title">Graduation Countdown</h2>
      </div>
      <label class="subtle" for="gradDate">Graduation date</label>
      <input type="date" id="gradDate" />
      <p id="gradCountdown" class="big-metric"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
